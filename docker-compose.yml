services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env.docker
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped